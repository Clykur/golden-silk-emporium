name: Maaya Couture CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: maaya_couture_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-color: "always"
          node-version: "22"

      - name: Install All Dependencies (Monorepo)
        run: npm ci

      - name: Run Prisma Generate & Migrations (Test DB)
        run: |
          npm run prisma:generate
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/maaya_couture_test?schema=public" npm run prisma:migrate
        env:
          NODE_ENV: development

      - name: Build Backend (TS compilation)
        run: npm run build:backend

      - name: Build Frontend
        run: npm run build:frontend

      - name: Build Docker Images (Verify containerization)
        run: |
          docker build -f backend/Dockerfile -t maaya-backend:latest ./backend
          docker build -f frontend/Dockerfile -t maaya-frontend:latest ./frontend
