name: Maaya Couture CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-color: "always"
          node-version: "22"

      - name: Install All Dependencies (Monorepo)
        run: npm ci

      - name: Run Prisma Generate
        run: npm run prisma:generate -w backend
        env:
          NODE_ENV: development

      - name: Build Backend (TS compilation)
        run: npm run build:backend

      - name: Build Frontend
        run: npm run build:frontend